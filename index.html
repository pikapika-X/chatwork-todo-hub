<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ToDo Hub Station</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1c212a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ToDo Hub">
  <script>
  /* google.script.run シム: GAS の代わりに Cloudflare Worker を fetch する。
     既存 UI のコードは google.script.run.withSuccessHandler(...).apiXxx(...) のまま動く。 */
  (function () {
    var WORKER_URL = 'https://chatwork-todo-hub.usdm-information.workers.dev';
    var ROOM_BATCH = 15;       // 1バッチ=最大15室。Worker側で429リトライしても subrequest上限(50)に収まる(15×3=45)
    var BATCH_CONCURRENCY = 2; // バッチ(Worker呼び出し)を同時に投げる数。多すぎるとChatworkが429を返し取りこぼす
    function makeRunner() {
      var onOk = function () {}, onFail = function () {};
      function callRaw(action, payload) {
        var data = Object.assign({ action: action }, payload);
        return fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=UTF-8' }, // 単純リクエスト化（CORSプリフライト回避）
          body: JSON.stringify(data)
        }).then(function (r) { return r.json(); });
      }
      function call(action, payload) {
        callRaw(action, payload).then(function (d) { onOk(d); }).catch(function (e) { onFail(e); });
      }
      // 全ルームのタスクを取得: roomList（軽量）→ 15室ずつ roomTasksBatch を同時数を絞って実行 → 結合
      function roomTasks(token, force) {
        callRaw('roomList', { token: token }).then(function (list) {
          if (!list || !list.ok) { onOk(list || { ok: false, message: 'ルーム一覧の取得に失敗しました' }); return; }
          var rooms = list.rooms || [];
          var batches = [];
          for (var i = 0; i < rooms.length; i += ROOM_BATCH) batches.push(rooms.slice(i, i + ROOM_BATCH));
          var results = new Array(batches.length);
          var next = 0;
          // バッチを BATCH_CONCURRENCY 個ずつ順に処理（Chatworkへの同時アクセスを抑え429を回避）
          function runOne() {
            if (next >= batches.length) return Promise.resolve();
            var idx = next++;
            return callRaw('roomTasksBatch', { token: token, rooms: batches[idx], force: !!force })
              .catch(function () { return { ok: false, tasks: [] }; }) // 一部失敗は握りつぶして部分結果を返す
              .then(function (r) { results[idx] = r; return runOne(); });
          }
          var workers = [];
          for (var w = 0; w < Math.min(BATCH_CONCURRENCY, batches.length); w++) workers.push(runOne());
          Promise.all(workers).then(function () {
            var tasks = [];
            results.forEach(function (r) { if (r && r.ok && r.tasks) tasks = tasks.concat(r.tasks); });
            var roomsBrief = rooms.map(function (r) { return { name: r.name, lastUpdate: r.last_update_time || 0 }; });
            onOk({ ok: true, me: list.me, tasks: tasks, rooms: roomsBrief, cached: false });
          }).catch(function (e) { onFail(e); });
        }).catch(function (e) { onFail(e); });
      }
      var api = {
        withSuccessHandler: function (fn) { if (fn) onOk = fn; return api; },
        withFailureHandler: function (fn) { if (fn) onFail = fn; return api; },
        apiInit: function (token) { call('init', { token: token }); },
        apiRoomTasks: function (token, force) { roomTasks(token, force); },
        apiCompleteTask: function (token, roomId, taskId) { call('completeTask', { token: token, roomId: roomId, taskId: taskId }); },
        apiLoadSettings: function (token) { call('loadSettings', { token: token }); },
        apiSaveSettings: function (token, payload, clientUpdatedAt) { call('saveSettings', { token: token, payload: payload, clientUpdatedAt: clientUpdatedAt }); }
      };
      return api;
    }
    window.google = window.google || {};
    window.google.script = window.google.script || {};
    Object.defineProperty(window.google.script, 'run', { get: makeRunner });
  })();
  </script>
  <style>
    :root{
      --paper:#eef1f5; --surface:#ffffff; --soft:#f1f4f8; --ink:#1e2430; --sub:#5c6675;
      --line:#d4dae2; --line2:#a9b3c0; --green:#41566d; --green-s:#e6ecf3;
      --blue:#34608f; --blue-s:#e7eff8; --gold:#9a6708; --gold-s:#fff0d4;
      --shadow:0 14px 34px rgba(30,40,60,.12);
    }
    :root[data-theme="dark"]{
      --paper:#13161b; --surface:#1c212a; --soft:#232a34; --ink:#e7ebf2; --sub:#9aa6b6;
      --line:#313a47; --line2:#47525f; --green:#7d97b3; --green-s:#22303f;
      --blue:#6fa1e0; --blue-s:#1b2c40; --gold:#d6a043; --gold-s:#3a2e16;
      --shadow:0 14px 34px rgba(0,0,0,.55);
    }
    html{background:var(--paper)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;color:var(--ink);background:var(--paper);
      font-family:"Hiragino Sans","Yu Gothic",-apple-system,"Segoe UI",sans-serif}
    button,input,select{font:inherit}
    button{min-height:36px;border:1px solid transparent;border-radius:7px;background:var(--green);
      color:#fff;padding:0 12px;font-weight:700;cursor:pointer}
    button:hover{filter:brightness(.95)}
    button.ghost{background:var(--surface);border-color:var(--line);color:var(--ink)}
    input,select{width:100%;min-height:36px;border:1px solid var(--line);border-radius:7px;
      background:#fff;color:var(--ink);padding:0 11px}
    .hidden{display:none!important}
    h1,h2,p{margin:0}

    .token-shell{min-height:100vh;display:grid;place-items:center;padding:24px}
    .token-card{width:min(520px,100%);border:1px solid var(--line);border-radius:10px;
      background:var(--surface);box-shadow:var(--shadow);padding:26px}
    .token-card h1{font-size:24px;margin-bottom:6px}
    .token-card p{color:var(--sub);line-height:1.7;font-size:14px;margin-bottom:16px}
    .token-grid{display:grid;gap:10px}
    .help{margin-top:14px;border:1px solid var(--line);background:var(--soft);border-radius:8px;
      padding:12px;color:var(--sub);font-size:12px;line-height:1.7}
    .help a{color:var(--green)}
    .msg{min-height:18px;margin-top:8px;color:#b42318;font-size:13px}

    .shell{width:min(1320px,calc(100vw - 24px));margin:0 auto;padding:16px 0 40px}
    .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-bottom:12px}
    .bar h1{font-size:21px;display:flex;gap:10px;align-items:center}
    .who{font-size:12px;font-weight:700;color:var(--sub);border:1px solid var(--line);
      border-radius:999px;padding:3px 10px;background:var(--surface);cursor:pointer}
    .who::after{content:' ▾';color:var(--sub)}
    .usermenu{position:fixed;left:12px;top:54px;z-index:45;background:#fff;border:1px solid var(--line);
      border-radius:8px;box-shadow:var(--shadow);padding:6px}
    .usermenu button{width:100%;white-space:nowrap}
    .bar-actions{display:flex;gap:8px;flex-wrap:wrap}
    .tabs{display:flex;gap:6px;flex-wrap:wrap}
    .tab{min-height:34px;border:1px solid var(--line);border-radius:999px;background:var(--surface);
      color:var(--sub);padding:0 14px;font-weight:700;cursor:pointer}
    .tab.active{background:var(--green);border-color:var(--green);color:#fff}
    /* 1行ツールバー（タブ＋検索＋絞り込み＋全部表示＋インデックス追加） */
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
    .toolbar #search{flex:1 1 180px;min-width:130px;width:auto}
    .toolbar select{width:auto;min-width:96px;flex:0 1 auto}
    .toolbar .roomsel{flex:1 1 160px;min-width:130px}
    .toolbar .newonly{white-space:nowrap}
    .roomsel{position:relative}
    .roomsel #roomBtn{width:100%;text-align:left;font-weight:700}
    .roommenu{position:absolute;z-index:46;top:calc(100% + 4px);left:0;min-width:240px;max-width:340px;
      background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:8px}
    .roommenu-acts{display:flex;gap:6px;margin-bottom:6px}
    .roommenu-acts button{flex:1;min-height:30px;font-size:12px}
    .roomlist{max-height:46vh;overflow:auto;display:flex;flex-direction:column;gap:2px}
    .roomlist label{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:6px;font-size:13px;cursor:pointer}
    .roomlist label:hover{background:var(--soft)}
    .roomlist input{width:auto;min-height:auto;flex:0 0 auto}
    .roomlist .rcount{margin-left:auto;color:var(--sub);font-size:11px}
    .roomlist .none{color:var(--sub);font-size:12px;padding:6px}
    .toolbar #addColBtn{min-height:36px;white-space:nowrap}
    .addbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;color:var(--sub);font-size:12px}
    .newonly{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub)}
    .newonly input{width:auto;min-height:auto}
    .summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;color:var(--sub);font-size:13px}
    .summary b{color:var(--ink)}

    /* card */
    .card{border:1px solid var(--line);border-left:4px solid var(--line2);border-radius:8px;
      background:var(--surface);padding:9px 10px;cursor:grab}
    .card.memo{border-left-color:var(--blue)}
    .card.bookmark{border-left-color:var(--gold)}
    .tag.bm{background:var(--gold-s);color:var(--gold);font-weight:700}
    .chead{display:flex;align-items:center;gap:5px;margin-bottom:4px;min-width:0}
    .ricon{width:16px;height:16px;border-radius:3px;object-fit:cover;flex:0 0 auto}
    .room{color:var(--green);font-weight:800;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .body{font-size:13px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}
    .foot{display:flex;flex-wrap:wrap;gap:6px;align-items:center;color:var(--sub);font-size:11px;margin-top:6px}
    .tag{background:var(--soft);border-radius:5px;padding:1px 6px}
    .tag.memo{background:var(--blue-s);color:var(--blue);font-weight:700}
    .imgtag{background:#eef;border-radius:5px;padding:1px 6px;color:var(--blue);font-weight:700}
    .foot a{color:var(--green);text-decoration:none;font-weight:700}
    .done-btn{min-height:24px;padding:0 9px;font-size:11px}
    .star-btn{min-height:24px;padding:0 7px;font-size:13px;margin-left:auto;background:var(--surface);
      border:1px solid var(--line);color:var(--sub);line-height:1}
    .star-btn.on{color:var(--gold);border-color:var(--gold)}
    .foot .done-btn{margin-left:0}

    /* mine: grid2 (no columns) */
    .grid2{column-count:2;column-gap:10px}
    .grid2 .card{break-inside:avoid;margin-bottom:10px}
    @media(max-width:680px){.grid2{column-count:1}}

    /* mine: kanban (with columns) */
    .kanban{display:flex;gap:10px}
    .kanban.scroll{overflow-x:auto;padding-bottom:8px}
    .kcol{flex:1 1 0;min-width:0;background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:8px}
    .kanban.scroll .kcol{flex:0 0 270px}
    .kcol.over{outline:2px dashed var(--green);outline-offset:-2px}
    .kcol-h{display:flex;justify-content:space-between;align-items:center;gap:6px;font-weight:800;font-size:13px;margin-bottom:8px}
    .kcol-h[draggable=true]{cursor:grab}
    .kcol-h[draggable=true]:active{cursor:grabbing}
    .kname{flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
    .kctr{display:flex;gap:3px;flex:0 0 auto}
    .kx{min-height:24px;padding:0 6px;font-size:11px;background:var(--surface);border:1px solid var(--line);color:var(--sub)}
    .kbody{display:flex;flex-direction:column;gap:8px;min-height:60px}
    .kbody .ph{height:0;border-top:3px solid var(--green);border-radius:2px;margin:1px 0;flex:0 0 auto}
    .kanban .kph{flex:0 0 4px;align-self:stretch;background:var(--green);border-radius:2px;min-height:80px}
    /* スマホ：自分のタスク/ブックマークも横スライド（担当者別と同様）＋列は固定幅 */
    @media(max-width:760px){
      .kanban{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
      .kanban .kcol,.kanban.scroll .kcol{flex:0 0 82vw;max-width:340px}
    }
    .card.dragging{opacity:.4}

    /* assignee board (compact) */
    .board{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;align-items:flex-start}
    .col{flex:0 0 188px;width:188px;min-width:0;max-width:188px;display:flex;flex-direction:column;gap:7px}
    .col-h{position:sticky;top:0;background:var(--paper);padding:3px 2px;border-bottom:2px solid var(--green);
      font-weight:800;font-size:12px;display:flex;justify-content:space-between;align-items:center}
    .col-h .cnt{color:var(--sub);font-size:11px;font-weight:700}
    .col-h{cursor:grab}
    .col-h:active{cursor:grabbing}
    .board .colph{flex:0 0 4px;align-self:stretch;background:var(--green);border-radius:2px;min-height:60px}
    .board .card{padding:7px 8px;cursor:default;min-width:0;max-width:100%}
    .board .body{-webkit-line-clamp:2;font-size:12px;overflow-wrap:anywhere}

    .empty{border:1px dashed var(--line2);border-radius:8px;padding:30px;text-align:center;color:var(--sub)}
    .loading{padding:40px;text-align:center;color:var(--sub)}
    .spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--green);
      border-radius:50%;display:inline-block;animation:spin 1s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
    #remZone{position:fixed;right:16px;bottom:16px;z-index:40;min-width:118px;border:2px dashed var(--line2);
      border-radius:10px;background:var(--surface);box-shadow:var(--shadow);padding:10px 12px;font-size:12px;
      color:var(--sub);text-align:center;cursor:pointer}
    #remZone.over{border-color:var(--green);background:var(--green-s);color:var(--green)}
    #remZone b{display:block;font-size:15px;color:var(--ink)}
    .modal{position:fixed;inset:0;z-index:60;display:grid;place-items:center;background:rgba(32,35,31,.34);padding:18px}
    .dialog{width:min(380px,100%);background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:18px}
    .dialog h2{font-size:17px;margin-bottom:6px}
    .dialog .lbl{color:var(--sub);font-size:12px;line-height:1.6;margin-bottom:12px;max-height:60px;overflow:auto}
    .dialog .acts{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
    .remlist{position:fixed;right:16px;bottom:74px;z-index:41;width:300px;max-height:50vh;overflow:auto;
      background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:10px}
    .remitem{border:1px solid var(--line);border-radius:7px;padding:8px;margin-bottom:7px;font-size:12px}
    .remitem .t{font-weight:700;color:var(--green)}
    .remitem button{min-height:24px;padding:0 8px;font-size:11px;background:var(--surface);border:1px solid var(--line);color:#b42318;margin-top:5px}
    #imgPop{position:fixed;z-index:50;pointer-events:none;display:none;border:1px solid var(--line);
      border-radius:8px;background:#fff;box-shadow:var(--shadow);padding:4px}
    #imgPop img{max-width:320px;max-height:320px;display:block;border-radius:5px}
    .note-wrap{flex:1 1 320px;min-width:200px;border:1px solid var(--line);border-radius:8px;
      background:var(--surface);overflow:hidden}
    .note{display:block;width:100%;border:0;border-radius:0;height:52px;min-height:34px;max-height:40vh;resize:vertical;
      padding:7px 10px;line-height:1.5;font-size:12px;overflow:auto;background:var(--surface);color:var(--ink)}
    .note:focus{outline:none}
    .brand{display:flex;align-items:center;gap:10px}
    .brand-logo{height:30px;width:auto;display:block}
    .token-logo{height:46px;width:auto;display:block;margin-bottom:10px}
    /* ダークモードでは背後に明るいプレートを敷いてメタリックを見やすく */
    :root[data-theme="dark"] .brand-logo,
    :root[data-theme="dark"] .token-logo{
      box-sizing:content-box;background:#eef1f6;padding:3px 9px;border-radius:7px;
      box-shadow:0 0 0 1px rgba(255,255,255,.12)}
    @media(max-width:760px){.filters{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <section id="tokenView" class="token-shell">
    <div class="token-card">
      <h1 id="tokenTitle"><img id="tokenLogo" class="token-logo hidden" alt="ToDo Hub Station"><span id="tokenTitleText">Chatwork TODO Hub</span></h1>
      <p>あなたの Chatwork API トークンを入力すると、参加中のルームのタスクを一覧で見られます。ログインは不要です。</p>
      <div class="token-grid">
        <input id="tokenInput" type="password" placeholder="Chatwork API トークン" autocomplete="off">
        <label style="font-size:12px;color:var(--sub)"><input type="checkbox" id="remember" checked style="width:auto;min-height:auto;margin-right:6px">このブラウザに保存する</label>
        <button onclick="saveToken()">接続する</button>
      </div>
      <div id="tokenMsg" class="msg"></div>
      <div class="help">
        <b>トークンの取得方法</b><br>
        Chatwork右上のアバター → サービス連携 → 「API Token」→ パスワード認証 → 表示されたトークンをコピー。<br>
        参考: <a href="https://help.chatwork.com/hc/ja/articles/360000142942" target="_blank">公式ヘルプ</a>
      </div>
    </div>
  </section>

  <section id="appView" class="shell hidden">
    <div class="bar">
      <h1 class="brand">
        <img id="brandLogo" class="brand-logo hidden" alt="ToDo Hub Station">
        <span id="brandText">TODO Hub</span>
        <span id="who" class="who" onclick="toggleUserMenu(event)"></span>
      </h1>
      <div class="note-wrap">
        <textarea id="note" class="note" placeholder="📝 進捗メモなど自由に（このブラウザに自動保存）"></textarea>
      </div>
      <div class="bar-actions">
        <button class="ghost" onclick="refresh()">更新</button>
      </div>
    </div>
    <div id="userMenu" class="usermenu hidden">
      <button class="ghost" id="themeBtn" onclick="toggleTheme()">🌙 ダークモードに変更</button>
      <button class="ghost" onclick="changeToken()">ログアウトとトークン変更</button>
    </div>

    <div class="toolbar">
      <div class="tabs">
        <button class="tab active" data-view="mine" onclick="switchView('mine')">自分のタスク</button>
        <button class="tab" data-view="assignee" onclick="switchView('assignee')">担当者別</button>
        <button class="tab" data-view="bookmark" onclick="switchView('bookmark')" title="ブックマーク">★</button>
      </div>
      <input id="search" type="search" placeholder="検索（本文・ルーム・担当者）" oninput="render()">
      <select id="kind" onchange="render()">
        <option value="task">タスク</option>
        <option value="memo">メモ</option>
      </select>
      <select id="sort" onchange="render()">
        <option value="original">オリジナル</option>
        <option value="new">新着順</option>
        <option value="old">古い順</option>
      </select>
      <div class="roomsel" id="roomSel">
        <button id="roomBtn" class="ghost" onclick="toggleRoomMenu(event)">ルーム：全部 ▾</button>
        <div id="roomMenu" class="roommenu hidden" onclick="event.stopPropagation()">
          <div class="roommenu-acts">
            <button class="ghost" onclick="roomSelectAll()">全選択</button>
            <button class="ghost" onclick="roomDeselectAll()">全解除</button>
          </div>
          <div id="roomList" class="roomlist"></div>
        </div>
      </div>
      <div class="roomsel hidden" id="assigneeSel">
        <button id="assigneeBtn" class="ghost" onclick="toggleAssigneeMenu(event)">担当者：全部 ▾</button>
        <div id="assigneeMenu" class="roommenu hidden" onclick="event.stopPropagation()">
          <div class="roommenu-acts">
            <button class="ghost" onclick="assigneeSelectAll()">全選択</button>
            <button class="ghost" onclick="assigneeDeselectAll()">全解除</button>
          </div>
          <div id="assigneeList" class="roomlist"></div>
        </div>
      </div>
      <label class="newonly" title="過去のタスクも含めてすべて表示"><input type="checkbox" id="showAll" onchange="saveShowAll()"> 全部表示</label>
      <button id="addColBtn" class="ghost hidden" onclick="addColumn()" title="タスクをドラッグして仕分けできます">＋ インデックス</button>
    </div>

    <div id="summary" class="summary"></div>
    <div id="loading" class="loading hidden"><span class="spinner"></span>取得中…（全ルームを巡回するため初回は少し時間がかかります）</div>
    <div id="content"></div>
    <div id="empty" class="empty hidden">表示できるタスクはありません。</div>
  </section>

  <div id="remZone" class="hidden" onclick="toggleRemList()" title="ここにタスクをドラッグするとリマインドを設定できます">⏰ リマインド<b id="remCount">0</b></div>
  <div id="remList" class="remlist hidden"></div>
  <div id="remModal" class="modal hidden">
    <div class="dialog">
      <h2>リマインド設定</h2>
      <div id="remTaskLabel" class="lbl"></div>
      <input id="remWhen" type="datetime-local">
      <div class="acts">
        <button class="ghost" onclick="closeRemDialog()">キャンセル</button>

    function applyLogo() {
      if (!LOGO_DATA || LOGO_DATA.charAt(0) === '_') return; // 未埋め込み時は文字タイトルのまま
      var url = 'data:image/png;base64,' + LOGO_DATA;
      ['brandLogo', 'tokenLogo'].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) { el.src = url; el.classList.remove('hidden'); }
      });
      ['brandText', 'tokenTitleText'].forEach(function (id) {
        var el = document.getElementById(id); if (el) el.classList.add('hidden');
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      applyTheme(localStorage.getItem(THEME_KEY) === 'dark' ? 'dark' : 'light');
      applyLogo();
      COLS.task = readJson(COL_KEYS.task, null) || readJson(COL_KEY, []); // 旧データはタスク用へ移行
      COLS.memo = readJson(COL_KEYS.memo, []);
      COLS.bm = readJson(COL_KEYS.bm, []);
      ASG.task = readJson(ASG_KEYS.task, null) || readJson(ASSIGN_KEY, {});
      ASG.memo = readJson(ASG_KEYS.memo, {});
      ASG.bm = readJson(ASG_KEYS.bm, {});
      ORD.task = readJson(ORD_KEYS.task, {});
      ORD.memo = readJson(ORD_KEYS.memo, {});
      ORD.bm = readJson(ORD_KEYS.bm, {});
      reminders = readJson(REM_KEY, []);
      bookmarks = readJson(BM_KEY, []);
      assigneeOrder = readJson(ASSIGNEE_ORDER_KEY, []);
      selectedRooms = readJson(ROOMS_KEY, 'all');
      selectedAssignees = readJson(ASSIGNEES_KEY, 'all');
      var showAllBox = document.getElementById('showAll');
      if (showAllBox) showAllBox.checked = (localStorage.getItem(SHOWALL_KEY) === '1');
      var note = document.getElementById('note');
      if (note) { note.value = localStorage.getItem(NOTE_KEY) || ''; note.addEventListener('input', function () { localStorage.setItem(NOTE_KEY, note.value); }); }
      initRemZone();
      setInterval(checkReminders, 30000);
      checkReminders();
      setInterval(silentRefresh, 300000); // 5分ごとに自動更新
      document.addEventListener('click', function () {
        var m = document.getElementById('userMenu'); if (m) m.classList.add('hidden');
        var r = document.getElementById('roomMenu'); if (r) r.classList.add('hidden');
        var a = document.getElementById('assigneeMenu'); if (a) a.classList.add('hidden');
      });
      token = localStorage.getItem(TOKEN_KEY) || '';
      if (token) connect();
    });

    function toggleUserMenu(e) { if (e) e.stopPropagation(); document.getElementById('userMenu').classList.toggle('hidden'); }

    function silentRefresh() {
      if (document.hidden || !token) return;
      if (!document.getElementById('remModal').classList.contains('hidden')) return; // ダイアログ中は触らない
      google.script.run.withSuccessHandler(function (r) {
        if (!r.ok) return;
        cache.room = r.tasks;
        if (r.me) myId = r.me.accountId;
        if (r.rooms) roomsBrief = r.rooms;
        buildRoomFilter(); render();
      }).withFailureHandler(function () {}).apiRoomTasks(token, false); // 自動更新は軽量（変化のあった部屋だけ）
    }

    function readJson(k, def) { try { return JSON.parse(localStorage.getItem(k)) || def; } catch (e) { return def; } }
    function activeScope() {
      if (view === 'bookmark') return 'bm';
      var el = document.getElementById('kind');
      return (el && el.value === 'memo') ? 'memo' : 'task';
    }
    function activeColumns() { return COLS[activeScope()]; }
    function activeAssign() { return ASG[activeScope()]; }
    function activeOrder() { return ORD[activeScope()]; }
    function saveCols() { var s = activeScope(); localStorage.setItem(COL_KEYS[s], JSON.stringify(COLS[s])); }
    function saveAssign() { var s = activeScope(); localStorage.setItem(ASG_KEYS[s], JSON.stringify(ASG[s])); }
    function saveOrder() { var s = activeScope(); localStorage.setItem(ORD_KEYS[s], JSON.stringify(ORD[s])); }
    function getBaseline() { var v = localStorage.getItem(BASE_KEY); return v ? Number(v) : null; }
    function setBaseline(v) { localStorage.setItem(BASE_KEY, String(v)); }
    function saveShowAll() { localStorage.setItem(SHOWALL_KEY, document.getElementById('showAll').checked ? '1' : '0'); render(); }

    function saveToken() {
      var t = document.getElementById('tokenInput').value.trim();
      if (!t) { setTokenMsg('トークンを入力してください。'); return; }
      token = t;
      if (document.getElementById('remember').checked) localStorage.setItem(TOKEN_KEY, t);
      // トークンを入れ直したら起点を取り直す（次の load で「今」の最大IDが起点になる）
      localStorage.removeItem(BASE_KEY);
      connect();
    }

    function connect() {
      setTokenMsg('確認中…');
      google.script.run
        .withSuccessHandler(function (r) {
          if (!r.ok) { setTokenMsg('接続できません: ' + r.message); return; } // 一時的な429等で保存トークンは消さない
          me = r.me; myId = r.me.accountId;
          document.getElementById('tokenView').classList.add('hidden');
          document.getElementById('appView').classList.remove('hidden');
          document.getElementById('who').textContent = me.name + ' さん';
          document.getElementById('remZone').classList.remove('hidden');
          updateRemCount();
          switchView('mine');
        })
        .withFailureHandler(function (e) { setTokenMsg(String(e && e.message ? e.message : e)); })
        .apiInit(token);
    }

    function changeToken() {
      localStorage.removeItem(TOKEN_KEY);
      token = ''; me = null; cache = { mine: null, room: null };
      document.getElementById('appView').classList.add('hidden');
      document.getElementById('tokenView').classList.remove('hidden');
      document.getElementById('remZone').classList.add('hidden');
      document.getElementById('remList').classList.add('hidden');
      document.getElementById('tokenInput').value = '';
      setTokenMsg('');
    }

    function switchView(v) {
      view = v;
      var tabs = document.querySelectorAll('.tab');
      for (var i = 0; i < tabs.length; i++) tabs[i].classList.toggle('active', tabs[i].dataset.view === v);
      document.getElementById('addColBtn').classList.toggle('hidden', !(v === 'mine' || v === 'bookmark'));
      updateFilterVisibility();
      if (v === 'bookmark') { buildRoomFilter(); render(); } // ローカル保存なので取得不要
      else load(false);
    }

    function refresh() { load(true); }

    function load(force) {
      if (!force && cache.room) { afterData(); return; }
      showLoading(true);
      google.script.run.withSuccessHandler(function (r) {
        showLoading(false);
        if (!r.ok) { failLoad({ message: r.message }); return; }
        cache.room = r.tasks;
        if (r.me) myId = r.me.accountId;
        if (r.rooms) roomsBrief = r.rooms;
        if (getBaseline() === null) { // 初回接続＝起点
          var maxId = 0;
          r.tasks.forEach(function (t) { if (Number(t.taskId) > maxId) maxId = Number(t.taskId); });
          setBaseline(maxId);
        }
        afterData();
      }).withFailureHandler(failLoad).apiRoomTasks(token, !!force);
    }

    function afterData() { buildRoomFilter(); buildAssigneeFilter(); updateFilterVisibility(); render(); }

    function failLoad(e) {
      showLoading(false);
      document.getElementById('content').innerHTML = '';
      var el = document.getElementById('empty'); el.classList.remove('hidden');
      el.textContent = 'エラー: ' + (e && e.message ? e.message : e);
    }

    function currentTasks() {
      if (view === 'bookmark') return bookmarks.slice();
      var all = cache.room || [];
      if (view === 'mine') return all.filter(function (t) { return String(t.assigneeId) === String(myId); });
      return all;
    }

    function roomVisible(name) {
      if (selectedRooms === 'all') return true;
      return Array.isArray(selectedRooms) && selectedRooms.indexOf(name) !== -1;
    }
    function saveRooms() { localStorage.setItem(ROOMS_KEY, JSON.stringify(selectedRooms)); }
    function toggleRoomMenu(e) {
      if (e) e.stopPropagation();
      var m = document.getElementById('roomMenu');
      var willOpen = m.classList.contains('hidden');
      document.getElementById('userMenu').classList.add('hidden');
      m.classList.toggle('hidden');
      if (willOpen) renderRoomList();
    }
    // 現在の表示対象タスクに存在する部屋を、やり取りが多い（最近更新）順に並べる
    function presentRoomsOrdered() {
      var present = {};
      currentTasks().forEach(function (t) { if (t.roomName) present[t.roomName] = (present[t.roomName] || 0) + 1; });
      var lu = {}; roomsBrief.forEach(function (r) { lu[r.name] = r.lastUpdate || 0; });
      return Object.keys(present)
        .sort(function (a, b) { return (lu[b] || 0) - (lu[a] || 0) || a.localeCompare(b, 'ja'); })
        .map(function (n) { return { name: n, count: present[n] }; });
    }
    // 「全部」状態から個別操作に切り替えるとき、現状の全部屋を明示配列にする
    function ensureRoomArray() {
      if (!Array.isArray(selectedRooms)) {
        selectedRooms = presentRoomsOrdered().map(function (r) { return r.name; });
      }
    }
    function roomSelectAll() { selectedRooms = 'all'; saveRooms(); renderRoomList(); updateRoomBtn(); render(); }
    function roomDeselectAll() { selectedRooms = []; saveRooms(); renderRoomList(); updateRoomBtn(); render(); }
    function toggleRoom(name, checked) {
      ensureRoomArray();
      var i = selectedRooms.indexOf(name);
      if (checked && i === -1) selectedRooms.push(name);
      if (!checked && i !== -1) selectedRooms.splice(i, 1);
      saveRooms(); updateRoomBtn(); render();
    }
    function renderRoomList() {
      var list = document.getElementById('roomList'); if (!list) return;
      var rooms = presentRoomsOrdered();
      list.innerHTML = '';
      if (!rooms.length) { list.innerHTML = '<div class="none">表示できるルームがありません。</div>'; return; }
      rooms.forEach(function (r) {
        var lb = document.createElement('label');
        var cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = roomVisible(r.name);
        cb.onchange = function () { toggleRoom(r.name, cb.checked); };
        var nm = document.createElement('span'); nm.textContent = r.name;
        var cn = document.createElement('span'); cn.className = 'rcount'; cn.textContent = r.count;
        lb.appendChild(cb); lb.appendChild(nm); lb.appendChild(cn);
        list.appendChild(lb);
      });
    }
    function updateRoomBtn() {
      var btn = document.getElementById('roomBtn'); if (!btn) return;
      var label;
      if (selectedRooms === 'all') label = '全部';
      else if (!selectedRooms.length) label = 'なし';
      else label = selectedRooms.length + '件';
      btn.textContent = 'ルーム：' + label + ' ▾';
    }
    // 旧名のまま、データ更新時に呼ばれる（ボタン表示＋メニュー内容を更新）
    function buildRoomFilter() { updateRoomBtn(); if (!document.getElementById('roomMenu').classList.contains('hidden')) renderRoomList(); }

    /* ---- 担当者フィルタ（担当者別ビュー専用。ルームのプルダウンの代わり） ---- */
    // 担当者別ビューでは自分のタスクは対象外
    function boardTasks() {
      return currentTasks().filter(function (t) { return String(t.assigneeId) !== String(myId); });
    }
    // 現在のタスクに存在する担当者を、やり取り（タスク件数）の多い順に並べる

    function buildAssigneeFilter() { updateAssigneeBtn(); if (!document.getElementById('assigneeMenu').classList.contains('hidden')) renderAssigneeList(); }
    // ビューに応じてルール/担当者のプルダウンを出し分ける
    function updateFilterVisibility() {
      var roomSel = document.getElementById('roomSel'), asgSel = document.getElementById('assigneeSel');

    function cleanBody(b) {
      return String(b || '')
        .replace(/\[info\][\s\S]*?\[\/info\]/g, function (m) { return m.replace(/\[\/?[a-zA-Z][^\]]*\]/g, ''); })
        .replace(/\[\/?[a-zA-Z][^\]]*\]/g, '')
        .replace(/\[(?:To|rp|qt|qtmeta)[^\]]*\]/g, '')
        .replace(/\r/g, '')
        .replace(/\n{2,}/g, '\n')
        .trim();
    }

    function extractImageUrls(body) {
      var re = /https?:\/\/[^\s\]"'<>]+?\.(?:png|jpe?g|gif|webp|bmp|svg)(?:\?[^\s\]"'<>]*)?/ig;
      var urls = [], m;
      while ((m = re.exec(String(body || '')))) { urls.push(m[0]); }
      return urls;
    }

    var _pop;
    function popEl() { if (!_pop) _pop = document.getElementById('imgPop'); return _pop; }
    function showImg(url, e) { var p = popEl(); p.querySelector('img').src = url; p.style.display = 'block'; moveImg(e); }
    function moveImg(e) {
      var p = popEl(); if (p.style.display !== 'block') return;
      var x = e.clientX + 16, y = e.clientY + 16, w = 340, h = 340;
      if (x + w > window.innerWidth) x = window.innerWidth - w - 10;
      if (y + h > window.innerHeight) y = window.innerHeight - h - 10;
      p.style.left = Math.max(6, x) + 'px'; p.style.top = Math.max(6, y) + 'px';
    }
    function hideImg() { var p = popEl(); p.style.display = 'none'; p.querySelector('img').src = ''; }
    function attachImgHover(el, urls) {
      if (!urls || !urls.length) return;
      el.addEventListener('mouseenter', function (e) { showImg(urls[0], e); });
      el.addEventListener('mousemove', moveImg);
      el.addEventListener('mouseleave', hideImg);
    }

    function getFiltered() {
      var tasks = currentTasks().slice();
      var kind = document.getElementById('kind').value;
      var q = document.getElementById('search').value.trim().toLowerCase();
      var base = getBaseline() || 0;
      var showAll = view === 'bookmark' || document.getElementById('showAll').checked;
      return tasks.filter(function (t) {
        if (!showAll && Number(t.taskId) <= base) return false;
        if (view !== 'bookmark') { // ブックマークはタスク/メモ問わず全部見せる
          if (kind === 'task' && t.isMemo) return false;
          if (kind === 'memo' && !t.isMemo) return false;
        }
        // 担当者別ビューは担当者フィルタ、それ以外はルームフィルタで絞る
        if (view === 'assignee') {
          if (String(t.assigneeId) === String(myId)) return false; // 自分のタスクは担当者別では出さない
          if (!assigneeVisible(t.assigneeName || '(未設定)')) return false;
        } else { if (!roomVisible(t.roomName)) return false; }
        if (q) { if ((t.body + ' ' + t.roomName + ' ' + t.assigneeName).toLowerCase().indexOf(q) === -1) return false; }
        return true;
      });
    }

    function sortTasks(tasks) {
      var sort = document.getElementById('sort').value;
      tasks.sort(function (a, b) {
        if (sort === 'old') return Number(a.taskId) - Number(b.taskId);
        return Number(b.taskId) - Number(a.taskId); // new / original の基準は新着
      });
      return tasks;
    }

    function render() {

      document.getElementById('summary').innerHTML = '<span>表示 <b>' + tasks.length + '</b> 件</span>';
      var content = document.getElementById('content');
      content.innerHTML = '';
      document.getElementById('empty').classList.toggle('hidden', tasks.length > 0);
      if (tasks.length === 0) return;
      if (view === 'assignee') renderBoard(content, tasks);
      else renderMine(content, tasks); // 自分のタスク・ブックマークはカンバン（自作インデックス）
    }

    /* ---- ブックマーク（このブラウザ内に中身ごと保存） ---- */
    function bmKey(t) { return String(t.roomId) + '-' + String(t.taskId); }
    function isBookmarked(t) { return bookmarks.some(function (b) { return bmKey(b) === bmKey(t); }); }
    function toggleBookmark(t) {
      var k = bmKey(t);
      if (isBookmarked(t)) {
        bookmarks = bookmarks.filter(function (b) { return bmKey(b) !== k; });
      } else {
        bookmarks.push({
          taskId: t.taskId, roomId: t.roomId, roomName: t.roomName, roomIcon: t.roomIcon,
          assigneeId: t.assigneeId, assigneeName: t.assigneeName, assignedByName: t.assignedByName,
          body: t.body, isMemo: t.isMemo, link: t.link, savedAt: Date.now()
        });
      }
      localStorage.setItem(BM_KEY, JSON.stringify(bookmarks));
    }

    /* ---- 自分のタスク：カスタムカンバン ---- */
    function columnExists(id) { var c = activeColumns(); for (var i = 0; i < c.length; i++) if (c[i].id === id) return true; return false; }

    function addColumn() {
      var s = activeScope();
      var label = s === 'memo' ? 'メモのインデックス名を入力' : s === 'bm' ? 'ブックマークのインデックス名を入力' : 'タスクのインデックス名を入力';
      var name = (prompt(label) || '').trim();
      if (!name) return;
      COLS[s].push({ id: 'c' + (new Date().getTime()), name: name });
      saveCols(); render();
    }
    function removeColumn(id) {
      var s = activeScope();
      COLS[s] = COLS[s].filter(function (c) { return c.id !== id; });
      var asg = ASG[s];
      Object.keys(asg).forEach(function (k) { if (asg[k] === id) delete asg[k]; });
      delete ORD[s][id];
      saveCols(); saveAssign(); saveOrder(); render();
    }

    /* インデックス（列）の並べ替え */
    function colIndex_(cols, id) { for (var i = 0; i < cols.length; i++) if (cols[i].id === id) return i; return -1; }
    function moveColumn(id, dir) { // ◀▶ ボタン
      var cols = activeColumns();
      var i = colIndex_(cols, id), j = i + dir;
      if (i === -1 || j < 0 || j >= cols.length) return;
      var t = cols[i]; cols[i] = cols[j]; cols[j] = t;
      saveCols(); render();
    }
    function moveColumnTo(id, at) { // ドラッグ&ドロップ（at は除外後の位置）
      var cols = activeColumns();
      var from = colIndex_(cols, id);
      if (from === -1) return;
      var moved = cols.splice(from, 1)[0];
      if (at < 0) at = 0; if (at > cols.length) at = cols.length;
      cols.splice(at, 0, moved);
      saveCols(); render();
    }
    var _kph = null;
    function ensureKph() { if (!_kph) { _kph = document.createElement('div'); _kph.className = 'kph'; } return _kph; }
    function removeKph() { if (_kph && _kph.parentNode) _kph.parentNode.removeChild(_kph); }
    function positionKph(kanban, x) {
      var ph = ensureKph();
      var cols = Array.prototype.slice.call(kanban.querySelectorAll('.kcol[data-colid]')); // カスタム列のみ
      var ref = null;
      for (var i = 0; i < cols.length; i++) {
        if (cols[i].dataset.colid === draggingColId) continue;
        var r = cols[i].getBoundingClientRect();
        if (x < r.left + r.width / 2) { ref = cols[i]; break; }
      }
      if (ref) kanban.insertBefore(ph, ref); else kanban.appendChild(ph);
    }
    function kphIndex(kanban) {
      var nodes = kanban.childNodes, idx = 0;
      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        if (n === _kph) return idx;
        if (n.classList && n.classList.contains('kcol') && n.dataset.colid) {
          if (n.dataset.colid === draggingColId) continue;
          idx++;
        }
      }
      return idx;
    }

    function renderMine(content, tasks) {
      var cols = activeColumns(), asg = activeAssign();
      var bm = activeScope() === 'bm';
      var inboxName = bm ? (cols.length ? '未分類' : 'ブックマーク') : '未分類';
      var kanban = document.createElement('div');
      kanban.className = 'kanban' + ((cols.length + 1) >= 4 ? ' scroll' : '');
      kanban.appendChild(buildColumn('_inbox', inboxName,
        tasks.filter(function (t) { return !asg[t.taskId] || !columnExists(asg[t.taskId]); }), false));
      cols.forEach(function (c) {
        kanban.appendChild(buildColumn(c.id, c.name, tasks.filter(function (t) { return asg[t.taskId] === c.id; }), true));
      });
      // インデックス（列）の並べ替え：ヘッダーをドラッグ（PC）。kanban全体で受ける。
      kanban.addEventListener('dragover', function (e) {
        if (!draggingColId) return;
        e.preventDefault();
        try { e.dataTransfer.dropEffect = 'move'; } catch (_) {}
        positionKph(kanban, e.clientX);
      });
      kanban.addEventListener('drop', function (e) {
        if (!draggingColId) return;
        e.preventDefault();
        var at = kphIndex(kanban); removeKph();
        moveColumnTo(draggingColId, at);
        draggingColId = null;
      });

    }

    function buildColumn(colId, name, list, removable) {
      var col = document.createElement('div'); col.className = 'kcol';
      if (removable) col.dataset.colid = colId;
      var h = document.createElement('div'); h.className = 'kcol-h';
      var nm = document.createElement('span'); nm.className = 'kname'; nm.textContent = name + ' (' + list.length + ')';
      h.appendChild(nm);
      if (removable) {
        var ctr = document.createElement('span'); ctr.className = 'kctr';
        var lf = document.createElement('button'); lf.className = 'kx'; lf.textContent = '◀'; lf.title = '左へ移動';
        lf.onclick = function (e) { e.stopPropagation(); moveColumn(colId, -1); };
        var rg = document.createElement('button'); rg.className = 'kx'; rg.textContent = '▶'; rg.title = '右へ移動';
        rg.onclick = function (e) { e.stopPropagation(); moveColumn(colId, 1); };
        var x = document.createElement('button'); x.className = 'kx'; x.textContent = '✕'; x.title = 'この列を削除（タスクは未分類へ戻る）';
        x.onclick = function (e) { e.stopPropagation(); removeColumn(colId); };
        ctr.appendChild(lf); ctr.appendChild(rg); ctr.appendChild(x);
        h.appendChild(ctr);
        // ヘッダーをドラッグして並べ替え（PC）
        h.draggable = true; h.title = 'ドラッグで並べ替え';
        h.addEventListener('dragstart', function (e) {
          draggingColId = colId;
          try { e.dataTransfer.setData('text/col', colId); e.dataTransfer.effectAllowed = 'move'; } catch (_) {}
        });
        h.addEventListener('dragend', function () { draggingColId = null; removeKph(); });
      }
      col.appendChild(h);
      var body = document.createElement('div'); body.className = 'kbody';
      // 全列で並べ替え・配置変更が可能。オリジナル選択時のみ手動順を表示（他は選択中のソート順）。
      var sortable = true;
      var useManual = document.getElementById('sort').value === 'original';
      var ordered = useManual ? orderedList(colId, list) : list;
      ordered.forEach(function (t) { body.appendChild(taskCard(t)); });
      col.appendChild(body);
      // 列全体をドロップ対象にする（見出し・余白に落としても効く）
      col.addEventListener('dragover', function (e) {
        if (draggingColId) return; // 列の並べ替え中はカード処理しない（kanbanが受ける）
        e.preventDefault();
        try { e.dataTransfer.dropEffect = 'move'; } catch (_) {}
        col.classList.add('over');
        if (sortable) positionPlaceholder(body, e.clientY); // 挿入位置の線
      });
      col.addEventListener('dragleave', function (e) {
        if (e.target === col || !col.contains(e.relatedTarget)) { col.classList.remove('over'); removePlaceholder(); }
      });
      col.addEventListener('drop', function (e) {
        if (draggingColId) return; // 列の並べ替えは kanban 側で処理
        e.preventDefault(); col.classList.remove('over');
        var id = e.dataTransfer.getData('text') || (draggingTask && String(draggingTask.taskId));
        if (!id) { removePlaceholder(); return; }
        var asg = activeAssign();
        if (colId === '_inbox') delete asg[id]; else asg[id] = colId;
        if (!sortable) { removePlaceholder(); saveAssign(); render(); return; }
        // 並び順を確定
        var at = placeholderIndex(body); removePlaceholder();
        var ids = colCardIds(body).filter(function (x) { return x !== id; });
        if (at < 0 || at > ids.length) at = ids.length;
        ids.splice(at, 0, id);
        activeOrder()[colId] = ids;
        saveAssign(); saveOrder(); render();
      });
      return col;
    }

    // 列内の手動並び順を反映（順序指定があるものを前に、残りは渡された順＝現在のソート順）
    // オリジナル順：自分で並べた手動順が最優先。未配置の新タスクは新着順で「上」に追加。
    function orderedList(colId, list) {
      var ord = activeOrder()[colId] || [];
      var pos = {}; ord.forEach(function (id, i) { pos[String(id)] = i; });
      var known = [], fresh = [];
      list.forEach(function (t) { (pos[String(t.taskId)] !== undefined ? known : fresh).push(t); });
      fresh.sort(function (a, b) { return Number(b.taskId) - Number(a.taskId); });        // 新着が上
      known.sort(function (a, b) { return pos[String(a.taskId)] - pos[String(b.taskId)]; }); // 手動順を維持
      return fresh.concat(known);
    }

    function colCardIds(bodyEl) {
      return Array.prototype.map.call(bodyEl.querySelectorAll('.card'), function (c) { return c.dataset.tid; });
    }

    /* ---- 並び替え用プレースホルダ（挿入位置インジケータ） ---- */
    var _ph = null;
    function ensurePh() { if (!_ph) { _ph = document.createElement('div'); _ph.className = 'ph'; } return _ph; }
    function removePlaceholder() { if (_ph && _ph.parentNode) _ph.parentNode.removeChild(_ph); }
    function positionPlaceholder(bodyEl, y) {
      var ph = ensurePh();
      var cards = Array.prototype.slice.call(bodyEl.querySelectorAll('.card'));
      var ref = null;
      for (var i = 0; i < cards.length; i++) {
        if (draggingTask && cards[i].dataset.tid === String(draggingTask.taskId)) continue;
        var r = cards[i].getBoundingClientRect();
        if (y < r.top + r.height / 2) { ref = cards[i]; break; }
      }
      if (ref) bodyEl.insertBefore(ph, ref); else bodyEl.appendChild(ph);
    }
    function placeholderIndex(bodyEl) {
      var nodes = bodyEl.childNodes, idx = 0;
      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        if (n === _ph) return idx;
        if (n.classList && n.classList.contains('card')) {
          if (draggingTask && n.dataset.tid === String(draggingTask.taskId)) continue; // 移動中カードは数えない
          idx++;
        }
      }
      return idx;
    }

    /* ---- 担当者別：コンパクトボード（列を左右に並べ替え可） ---- */
    function renderBoard(content, tasks) {
      var map = {};
      tasks.forEach(function (t) { var k = t.assigneeName || '(未設定)'; (map[k] = map[k] || []).push(t); });
      var pos = {}; assigneeOrder.forEach(function (n, i) { pos[n] = i; });
      var keys = Object.keys(map).sort(function (a, b) {
        var pa = pos[a], pb = pos[b], ha = pa !== undefined, hb = pb !== undefined;
        if (ha && hb) return pa - pb;       // 手動順を優先
        if (ha) return -1;
        if (hb) return 1;
        return map[b].length - map[a].length || a.localeCompare(b, 'ja'); // 残りはやり取り（件数）の多い順
      });
      var board = document.createElement('div'); board.className = 'board';
      keys.forEach(function (k) {
        var col = document.createElement('div'); col.className = 'col'; col.dataset.assignee = k;
        var h = document.createElement('div'); h.className = 'col-h'; h.draggable = true; h.title = 'ドラッグで左右に並べ替え';
        var nm = document.createElement('span'); nm.textContent = k;
        var cn = document.createElement('span'); cn.className = 'cnt'; cn.textContent = map[k].length;
        h.appendChild(nm); h.appendChild(cn); col.appendChild(h);
        h.addEventListener('dragstart', function (e) {
          draggingAssignee = k;
          try { e.dataTransfer.setData('text/assignee', k); e.dataTransfer.effectAllowed = 'move'; } catch (_) {}
        });
        h.addEventListener('dragend', function () { draggingAssignee = null; removeColPh(); });
        map[k].forEach(function (t) { col.appendChild(taskCard(t)); });
        board.appendChild(col);
      });
      board.addEventListener('dragover', function (e) {
        if (!draggingAssignee) return; // カードのドラッグには干渉しない
        e.preventDefault();
        try { e.dataTransfer.dropEffect = 'move'; } catch (_) {}
        positionColPh(board, e.clientX);
      });
      board.addEventListener('drop', function (e) {
        if (!draggingAssignee) return;
        e.preventDefault();
        var at = colPhIndex(board); removeColPh();
        var names = Array.prototype.map.call(board.querySelectorAll('.col'), function (c) { return c.dataset.assignee; })
          .filter(function (n) { return n !== draggingAssignee; });
        if (at < 0 || at > names.length) at = names.length;
        names.splice(at, 0, draggingAssignee);
        assigneeOrder = names;
        localStorage.setItem(ASSIGNEE_ORDER_KEY, JSON.stringify(assigneeOrder));
        draggingAssignee = null;
        render();
      });
      content.appendChild(board);
    }

    /* 担当者列の挿入位置インジケータ（縦線） */
    var _cph = null;
    function ensureCph() { if (!_cph) { _cph = document.createElement('div'); _cph.className = 'colph'; } return _cph; }
    function removeColPh() { if (_cph && _cph.parentNode) _cph.parentNode.removeChild(_cph); }
    function positionColPh(board, x) {
      var ph = ensureCph();
      var cols = Array.prototype.slice.call(board.querySelectorAll('.col'));
      var ref = null;
      for (var i = 0; i < cols.length; i++) {
        if (cols[i].dataset.assignee === draggingAssignee) continue;
        var r = cols[i].getBoundingClientRect();
        if (x < r.left + r.width / 2) { ref = cols[i]; break; }
      }
      if (ref) board.insertBefore(ph, ref); else board.appendChild(ph);
    }
    function colPhIndex(board) {
      var nodes = board.childNodes, idx = 0;
      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        if (n === _cph) return idx;
        if (n.classList && n.classList.contains('col')) {
          if (n.dataset.assignee === draggingAssignee) continue;
          idx++;
        }
      }
      return idx;
    }

    /* ---- 共通カード ---- */
    function taskCard(t) {
      var full = cleanBody(t.body) || '(本文なし)';
      var urls = extractImageUrls(t.body);
      var card = document.createElement('div'); card.className = 'card' + (t.isMemo ? ' memo' : '');
      card.title = full;

      var head = document.createElement('div'); head.className = 'chead';
      if (t.roomIcon) {
        var ic = document.createElement('img'); ic.className = 'ricon'; ic.src = t.roomIcon;
        ic.onerror = function () { ic.style.display = 'none'; };
        head.appendChild(ic);
      }
      var room = document.createElement('span'); room.className = 'room'; room.textContent = t.roomName || '';
      head.appendChild(room);

      var body = document.createElement('div'); body.className = 'body'; body.textContent = full;

      card.appendChild(head); card.appendChild(body); card.appendChild(cardFoot(t, urls));
      card.dataset.tid = String(t.taskId);
      card.draggable = true;
      card.addEventListener('dragstart', function (e) {
        draggingTask = t;
        try { e.dataTransfer.setData('text', String(t.taskId)); e.dataTransfer.effectAllowed = 'copyMove'; } catch (_) {}
        setTimeout(function () { card.classList.add('dragging'); }, 0);
      });
      card.addEventListener('dragend', function () { card.classList.remove('dragging'); removePlaceholder(); draggingTask = null; });
      attachImgHover(card, urls);
      return card;
    }

    function cardFoot(t, urls) {
      var foot = document.createElement('div'); foot.className = 'foot';
      if (t.isMemo) { var mt = document.createElement('span'); mt.className = 'tag memo'; mt.textContent = 'メモ'; foot.appendChild(mt); }
      if (urls && urls.length) { var it = document.createElement('span'); it.className = 'imgtag'; it.textContent = '🖼'; foot.appendChild(it); }
      var link = document.createElement('a');
      // 自分のタスクはルーム（未読）へ、それ以外（担当者別・ブックマーク）はそのタスク位置へ。
      var url = (view === 'mine') ? ('https://www.chatwork.com/#!rid' + t.roomId) : t.link;
      link.href = url;
      link.target = 'chatwork';
      link.textContent = '開く';
      link.addEventListener('click', function (e) {
        if (e.ctrlKey || e.metaKey || e.shiftKey) return; // 修飾キーは別タブ（ブラウザ既定）
        e.preventDefault();
        openChatwork(url);
      });
      foot.appendChild(link);
      // ⭐ブックマーク（このブラウザに保存）
      var star = document.createElement('button');
      star.className = 'star-btn' + (isBookmarked(t) ? ' on' : '');
      star.textContent = isBookmarked(t) ? '★' : '☆';
      star.title = isBookmarked(t) ? 'ブックマークを解除' : 'ブックマークに追加';
      star.onclick = function (e) { e.stopPropagation(); toggleBookmark(t); render(); };
      foot.appendChild(star);
      // 完了ボタンは自分が担当のタスクだけに表示
      if (String(t.assigneeId) === String(myId)) {
        var btn = document.createElement('button'); btn.className = 'done-btn'; btn.textContent = '完了';
        btn.onclick = function (e) { e.stopPropagation(); completeTask(t, btn); };
        foot.appendChild(btn);
      }
      return foot;
    }

    // Chatwork用タブを1枚使い回す。すでに開いていても新URL（タスク位置）へ確実に移動させる。
    function openChatwork(url) {
      try {
        var w = window.open(url, 'chatwork');
        if (w) { try { w.location.href = url; } catch (_) {} try { w.focus(); } catch (_) {} }
        else window.open(url, '_blank');
      } catch (_) { window.open(url, '_blank'); }
    }

    function completeTask(t, btn) {
      btn.disabled = true; btn.textContent = '…';
      google.script.run
        .withSuccessHandler(function (r) {
          if (!r.ok) { btn.disabled = false; btn.textContent = '完了'; alert('完了にできませんでした: ' + r.message); return; }
          removeTaskFromCache(t);
          render();
        })
        .withFailureHandler(function (e) { btn.disabled = false; btn.textContent = '完了'; alert('エラー: ' + (e && e.message ? e.message : e)); })
        .apiCompleteTask(token, t.roomId, t.taskId);
    }

    function removeTaskFromCache(t) {
      ['mine', 'room'].forEach(function (k) {
        if (!cache[k]) return;
        cache[k] = cache[k].filter(function (x) { return !(String(x.taskId) === String(t.taskId) && String(x.roomId) === String(t.roomId)); });
      });
    }

    function showLoading(on) {
      document.getElementById('loading').classList.toggle('hidden', !on);
      if (on) { document.getElementById('content').innerHTML = ''; document.getElementById('empty').classList.add('hidden'); }
    }
    function setTokenMsg(m) { document.getElementById('tokenMsg').textContent = m; }

    /* ---- リマインド ---- */
    function initRemZone() {
      var z = document.getElementById('remZone');
      z.addEventListener('dragover', function (e) { e.preventDefault(); z.classList.add('over'); });
      z.addEventListener('dragleave', function () { z.classList.remove('over'); });
      z.addEventListener('drop', function (e) { e.preventDefault(); z.classList.remove('over'); if (draggingTask) openRemDialog(draggingTask); });
    }
    function pad2(n) { return ('0' + n).slice(-2); }
    function toLocalInput(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()) + 'T' + pad2(d.getHours()) + ':' + pad2(d.getMinutes()); }
    function openRemDialog(t) {
      pendingRemTask = t;
      document.getElementById('remTaskLabel').textContent = (cleanBody(t.body) || '(本文なし)').slice(0, 120);
      document.getElementById('remWhen').value = toLocalInput(new Date(Date.now() + 3600000));
      document.getElementById('remModal').classList.remove('hidden');
      requestNotify();
    }
    function closeRemDialog() { document.getElementById('remModal').classList.add('hidden'); pendingRemTask = null; }
    function saveReminder() {
      var v = document.getElementById('remWhen').value;
      if (!v) { alert('日時を選んでください'); return; }
      var when = new Date(v).getTime();
      if (isNaN(when)) { alert('日時が正しくありません'); return; }
      reminders.push({
        id: 'r' + Date.now(), taskId: pendingRemTask.taskId, roomId: pendingRemTask.roomId,
        room: pendingRemTask.roomName || '', body: (cleanBody(pendingRemTask.body) || '').slice(0, 120),
        time: when, fired: false
      });
      localStorage.setItem(REM_KEY, JSON.stringify(reminders));
      closeRemDialog(); updateRemCount();
    }
    function requestNotify() { try { if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission(); } catch (_) {} }
    function checkReminders() {
      var now = Date.now(), changed = false;
      reminders.forEach(function (r) { if (!r.fired && r.time <= now) { fireReminder(r); r.fired = true; changed = true; } });
      if (changed) { localStorage.setItem(REM_KEY, JSON.stringify(reminders)); updateRemCount(); }
    }
    function fireReminder(r) {
      var title = '⏰ リマインド' + (r.room ? '：' + r.room : '');
      var shown = false;
      try { if ('Notification' in window && Notification.permission === 'granted') { new Notification(title, { body: r.body }); shown = true; } } catch (_) {}
      if (!shown) { try { document.title = '⏰ リマインド！'; } catch (_) {} alert(title + '\n' + r.body); }
    }
    function updateRemCount() { var el = document.getElementById('remCount'); if (el) el.textContent = reminders.filter(function (r) { return !r.fired; }).length; }
    function toggleRemList() {
      var el = document.getElementById('remList');
      if (!el.classList.contains('hidden')) { el.classList.add('hidden'); return; }
      renderRemList(); el.classList.remove('hidden');
    }
    function renderRemList() {
      var el = document.getElementById('remList'); el.innerHTML = '';
      var pend = reminders.filter(function (r) { return !r.fired; }).sort(function (a, b) { return a.time - b.time; });
      if (!pend.length) { el.innerHTML = '<div style="color:var(--sub);font-size:12px">予定中のリマインドはありません。</div>'; return; }
      pend.forEach(function (r) {
        var d = new Date(r.time);
        var item = document.createElement('div'); item.className = 'remitem';
        var t = document.createElement('div'); t.className = 't';
        t.textContent = (d.getMonth() + 1) + '/' + d.getDate() + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
        var b = document.createElement('div'); b.textContent = (r.room ? '[' + r.room + '] ' : '') + r.body;
        var x = document.createElement('button'); x.textContent = '取消'; x.onclick = function () { cancelReminder(r.id); };
        item.appendChild(t); item.appendChild(b); item.appendChild(x); el.appendChild(item);
      });
    }
    function cancelReminder(id) {
      reminders = reminders.filter(function (r) { return r.id !== id; });
      localStorage.setItem(REM_KEY, JSON.stringify(reminders));
      updateRemCount(); renderRemList();
    }
  </script>
</body>
</html>
